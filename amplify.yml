version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production
        - echo "SQS_QUEUE_URL=$SQS_QUEUE_URL" >> .env.production
        - echo "DYNAMODB_TABLE=$DYNAMODB_TABLE" >> .env.production
        - echo "APP_AWS_ACCESS_KEY_ID=$APP_AWS_ACCESS_KEY_ID" >> .env.production
        - echo "APP_AWS_SECRET_ACCESS_KEY=$APP_AWS_SECRET_ACCESS_KEY" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*